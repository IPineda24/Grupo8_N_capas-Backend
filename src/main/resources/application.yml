spring:
  application:
    name: telemedicina-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/telemedicina
    password: root
    username: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dGVsZW1lZGljaW5hLXNlY3JldC1rZXktcGFyYS1qd3QtdG9rZW4tc2VndXJvLTI1Ng==}
  expiration: 86400000

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  info:
    title: Telemedicina API
    description: API REST para sistema de gestion de citas medicas
    version: 1.0.0