spring:
  application:
    name: Telemedicina

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cors:
    allowed:
      origins: ${CORS_ORIGINS}